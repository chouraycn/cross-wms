name: PR Quality Gate

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (src + server)
        run: npm run lint

      - name: Check for unused dependencies
        run: npx depcheck || true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Type check backend
        run: npx tsc --noEmit --project server/tsconfig.json

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ONNX_DISABLE_NATIVE_DOWNLOAD: '1'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test -- --coverage --passWithNoTests

      - name: Check coverage thresholds
        run: |
          COVERAGE_JSON=$(cat coverage/coverage-summary.json 2>/dev/null || echo '{}')
          LINES=$(echo "$COVERAGE_JSON" | jq -r '.total.lines.pct // 0')
          FUNCTIONS=$(echo "$COVERAGE_JSON" | jq -r '.total.functions.pct // 0')
          BRANCHES=$(echo "$COVERAGE_JSON" | jq -r '.total.branches.pct // 0')
          STATEMENTS=$(echo "$COVERAGE_JSON" | jq -r '.total.statements.pct // 0')

          echo "Coverage Report:"
          echo "Lines: $LINES%"
          echo "Functions: $FUNCTIONS%"
          echo "Branches: $BRANCHES%"
          echo "Statements: $STATEMENTS%"

          MIN_LINES=80
          MIN_FUNCTIONS=75
          MIN_BRANCHES=70
          MIN_STATEMENTS=80

          if (( $(echo "$LINES < $MIN_LINES" | bc -l) )); then
            echo "::error::Lines coverage ($LINES%) below threshold ($MIN_LINES%)"
            exit 1
          fi
          if (( $(echo "$FUNCTIONS < $MIN_FUNCTIONS" | bc -l) )); then
            echo "::error::Functions coverage ($FUNCTIONS%) below threshold ($MIN_FUNCTIONS%)"
            exit 1
          fi
          if (( $(echo "$BRANCHES < $MIN_BRANCHES" | bc -l) )); then
            echo "::error::Branches coverage ($BRANCHES%) below threshold ($MIN_BRANCHES%)"
            exit 1
          fi
          if (( $(echo "$STATEMENTS < $MIN_STATEMENTS" | bc -l) )); then
            echo "::error::Statements coverage ($STATEMENTS%) below threshold ($MIN_STATEMENTS%)"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            node_modules/.vite/
          key: ${{ runner.os }}-vite-build-${{ hashFiles('**/package-lock.json', 'src/**', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-build-${{ hashFiles('**/package-lock.json') }}

      - name: Build frontend (vite)
        run: npm run build 2>&1 | tee build-output.log

      - name: Check build warnings
        run: |
          WARNING_COUNT=$(grep -c "warning" build-output.log || echo 0)
          ERROR_COUNT=$(grep -c "error" build-output.log || echo 0)
          echo "Build warnings: $WARNING_COUNT"
          echo "Build errors: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::error::Build contains errors"
            exit 1
          fi

      - name: Check bundle size
        run: |
          TOTAL_SIZE=$(du -sk dist/ | cut -f1)
          MAX_SIZE=50000
          echo "Bundle size: ${TOTAL_SIZE}KB"
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::warning::Bundle size exceeds ${MAX_SIZE}KB (current: ${TOTAL_SIZE}KB)"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npx tsc --project server/tsconfig.json --outDir server-dist 2>&1 | tee backend-build.log

      - name: Check backend build errors
        run: |
          ERROR_COUNT=$(grep -c "error TS" backend-build.log || echo 0)
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::error::Backend build contains $ERROR_COUNT errors"
            exit 1
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on critical)
        run: npm audit --audit-level=critical

      - name: Run dependency vulnerability scan
        run: npx snyk test --severity-threshold=critical || true

      - name: Check for outdated dependencies (info only)
        run: npm outdated || true
        if: always()

  e2e-test:
    name: E2E API Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-build, backend-build]
    env:
      ONNX_DISABLE_NATIVE_DOWNLOAD: '1'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e -- --passWithNoTests 2>&1 | tee e2e-output.log

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: e2e-output.log
          retention-days: 7

  swift-test:
    name: Swift Test (6.0)
    runs-on: macos-14
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check for Swift changes
        id: swift_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            swift:
              - 'apps/macos/**'
              - 'scripts/package-mac*.sh'
              - 'scripts/build-macos-swift.sh'
              - 'scripts/create-dmg.sh'
              - 'scripts/codesign-mac-app.sh'

      - name: Set up Swift
        if: steps.swift_changes.outputs.swift == 'true'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Cache Swift Package
        if: steps.swift_changes.outputs.swift == 'true'
        uses: actions/cache@v4
        with:
          path: apps/macos/.build
          key: ${{ runner.os }}-swift-6.0-spm-${{ hashFiles('apps/macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-spm-

      - name: Resolve Dependencies
        if: steps.swift_changes.outputs.swift == 'true'
        run: swift package resolve
        working-directory: apps/macos

      - name: Build
        if: steps.swift_changes.outputs.swift == 'true'
        run: swift build --build-tests
        working-directory: apps/macos

      - name: Run Tests
        if: steps.swift_changes.outputs.swift == 'true'
        run: swift test --disable-sandbox 2>&1 | tee test-output.log
        working-directory: apps/macos

      - name: Skip (no Swift changes)
        if: steps.swift_changes.outputs.swift != 'true'
        run: echo "No Swift-related changes detected, skipping Swift tests."

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always() && steps.swift_changes.outputs.swift == 'true'
        with:
          name: swift-test-results
          path: apps/macos/test-output.log
          retention-days: 7
