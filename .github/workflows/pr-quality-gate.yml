name: PR Quality Gate

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_call:
    # Reusable by build-and-release.yml and ci.yml — avoids duplicating quality gate jobs

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint (src + server)
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Type check backend
        run: npx tsc --noEmit --project server/tsconfig.json

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ONNX_DISABLE_NATIVE_DOWNLOAD: '1'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test -- --coverage --passWithNoTests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend (vite)
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run npm audit (fail on critical)
        run: npm audit --audit-level=critical --omit=dev

      - name: Check for outdated dependencies (info only)
        run: npm outdated || true
        if: always()

  swift-test:
    name: Swift Test (6.0)
    runs-on: macos-14
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check for Swift changes
        id: swift_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            swift:
              - 'apps/macos/**'
              - 'scripts/package-mac*.sh'
              - 'scripts/build-macos-swift.sh'
              - 'scripts/create-dmg.sh'
              - 'scripts/codesign-mac-app.sh'

      - name: Set up Swift
        if: steps.swift_changes.outputs.swift == 'true'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Cache Swift Package
        if: steps.swift_changes.outputs.swift == 'true'
        uses: actions/cache@v4
        with:
          path: apps/macos/.build
          key: ${{ runner.os }}-swift-6.0-spm-${{ hashFiles('apps/macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-spm-

      - name: Resolve Dependencies
        if: steps.swift_changes.outputs.swift == 'true'
        run: swift package resolve
        working-directory: apps/macos

      - name: Build
        if: steps.swift_changes.outputs.swift == 'true'
        run: swift build --build-tests
        working-directory: apps/macos

      - name: Run Tests
        if: steps.swift_changes.outputs.swift == 'true'
        run: swift test --disable-sandbox 2>&1 | tee test-output.log
        working-directory: apps/macos

      - name: Skip (no Swift changes)
        if: steps.swift_changes.outputs.swift != 'true'
        run: echo "No Swift-related changes detected, skipping Swift tests."

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always() && steps.swift_changes.outputs.swift == 'true'
        with:
          name: swift-test-results
          path: apps/macos/test-output.log
          retention-days: 7
