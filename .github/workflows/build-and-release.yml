name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch/minor/major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/pr-quality-gate.yml

  build:
    name: Build DMG (Swift)
    needs: quality-gate
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps

      - name: Pre-build check (打包前预检)
        run: bash scripts/pre-build-check.sh --quick

      - name: Bump version (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          node -e "
            const fs = require('fs');
            const path = './package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const parts = pkg.version.split('.').map(Number);
            const bump = '${BUMP_TYPE}';
            if (bump === 'major') {
              parts[0]++;
              parts[1] = 0;
              parts[2] = 0;
            } else if (bump === 'minor') {
              parts[1]++;
              parts[2] = 0;
            } else {
              parts[2]++;
            }
            pkg.version = parts.join('.');
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Version bumped to ' + pkg.version);
          "
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref }}"
            VERSION="${VERSION#refs/tags/v}"
          else
            VERSION=$(node -e "console.log(require('./package.json').version)")
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: npm run build

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Cache Swift Package
        uses: actions/cache@v4
        with:
          path: apps/macos/.build
          key: ${{ runner.os }}-swift-6.0-spm-release-${{ hashFiles('apps/macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-spm-release-
            ${{ runner.os }}-swift-6.0-spm-

      - name: Pre-download ONNX model files
        run: |
          MODEL_DIR="$HOME/.cdf-know-clow/models/all-MiniLM-L6-v2"
          mkdir -p "$MODEL_DIR"
          if [ ! -f "$MODEL_DIR/model.onnx" ]; then
            echo "📥 预下载 ONNX 模型文件..."
            curl -L -o "$MODEL_DIR/model.onnx" "https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/onnx/model_quantized.onnx" || true
            curl -L -o "$MODEL_DIR/tokenizer.json" "https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/tokenizer.json" || true
            curl -L -o "$MODEL_DIR/vocab.txt" "https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/vocab.txt" || true
            curl -L -o "$MODEL_DIR/config.json" "https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/config.json" || true
            echo "✅ ONNX 模型文件预下载完成"
          fi

      - name: Build Swift macOS app
        run: bash scripts/package-mac-dist.sh --no-bump --skip-release
        env:
          CI: true

      - name: Verify build artifacts
        run: |
          DMG_FILE="release/CDF-Know-Clow-${VERSION}-mac.dmg"
          JSON_FILE="release/release.json"

          if [ ! -f "$DMG_FILE" ]; then
            echo "::error::DMG not found at $DMG_FILE"
            echo "Contents of release/:"
            ls -la release/ 2>/dev/null || echo "(directory missing)"
            exit 1
          fi

          if [ ! -f "$JSON_FILE" ]; then
            echo "::error::release.json not found at $JSON_FILE"
            exit 1
          fi

          DMG_SIZE=$(stat -f%z "$DMG_FILE" 2>/dev/null || stat -c%s "$DMG_FILE" 2>/dev/null)
          if [ "$DMG_SIZE" -lt 1000000 ]; then
            echo "::error::DMG is suspiciously small (${DMG_SIZE} bytes < 1MB) — build may have failed"
            exit 1
          fi

          echo "DMG: $DMG_FILE ($DMG_SIZE bytes)"
          echo "JSON: $JSON_FILE"

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
            echo "## Changes since ${PREV_TAG}" >> $GITHUB_ENV
            git log ${PREV_TAG}..HEAD --oneline --no-merges | sed 's/^/- /' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "RELEASE_NOTES=Initial release" >> $GITHUB_ENV
          fi

      - name: Create Git Tag and Push Version Bump (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Bump version to ${{ env.VERSION }}" || true
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"
          git push origin HEAD:${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: CDF Know Clow v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            release/CDF-Know-Clow-${{ env.VERSION }}-mac.dmg
            release/release.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: CDF-Know-Clow-${{ env.VERSION }}-mac.dmg
          path: |
            release/CDF-Know-Clow-${{ env.VERSION }}-mac.dmg
            release/release.json
          retention-days: 90
