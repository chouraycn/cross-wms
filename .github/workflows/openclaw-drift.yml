name: OpenClaw Drift Check

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'server/**'
      - 'src/**'
      - 'openclaw/**'
      - '.gitmodules'
      - 'openclaw-vendor-pin.json'
      - 'FORK_BOUNDARY.md'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Check submodule status
        id: submodule-check
        run: |
          if [ -f ".gitmodules" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Submodule config found:"
            cat .gitmodules
            echo "Submodule status:"
            git submodule status
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::.gitmodules not found — submodule config is missing"
          fi

      - name: Check openclaw-vendor-pin.json exists
        id: pin-check
        run: |
          if [ -f "openclaw-vendor-pin.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Pin file found:"
            cat openclaw-vendor-pin.json
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::openclaw-vendor-pin.json not found — fork sync tracking is missing"
          fi

      - name: Validate vendor pin has version and commit
        if: steps.pin-check.outputs.exists == 'true'
        run: |
          VERSION=$(jq -r '.version' openclaw-vendor-pin.json)
          COMMIT=$(jq -r '.pinnedCommit' openclaw-vendor-pin.json)
          EMBEDDED_AT=$(jq -r '.embeddedAt' openclaw-vendor-pin.json)
          TRACKED=$(jq -r '.trackedByGit' openclaw-vendor-pin.json)

          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            echo "::error::openclaw-vendor-pin.json is missing version field"
            exit 1
          fi

          if [ "$COMMIT" = "null" ] || [ -z "$COMMIT" ]; then
            echo "::error::openclaw-vendor-pin.json is missing pinnedCommit field"
            exit 1
          fi

          echo "OpenClaw vendor pin:"
          echo "  Version: $VERSION"
          echo "  Pinned commit: $COMMIT"
          echo "  Embedded at: $EMBEDDED_AT"
          echo "  Tracked by git: $TRACKED"

      - name: Verify submodule commit matches vendor pin
        if: steps.submodule-check.outputs.exists == 'true' && steps.pin-check.outputs.exists == 'true'
        run: |
          SUBMODULE_COMMIT=$(git rev-parse HEAD:openclaw)
          PIN_COMMIT=$(jq -r '.pinnedCommit' openclaw-vendor-pin.json)

          if [ "$SUBMODULE_COMMIT" != "$PIN_COMMIT" ]; then
            echo "::warning::Submodule commit ($SUBMODULE_COMMIT) does not match vendor pin ($PIN_COMMIT)"
            echo "Please update openclaw-vendor-pin.json to reflect the current submodule commit"
          else
            echo "✓ Submodule commit matches vendor pin"
          fi

      - name: Check FORK_BOUNDARY.md is up to date
        run: |
          if [ ! -f "FORK_BOUNDARY.md" ]; then
            echo "::warning::FORK_BOUNDARY.md not found — fork boundary documentation is missing"
          else
            echo "FORK_BOUNDARY.md found ($(wc -l < FORK_BOUNDARY.md) lines)"
          fi

      - name: Verify runtime uses @cdf-know packages (not openclaw/)
        run: |
          LEAKS=$(grep -r "from.*['\"].*openclaw/" --include="*.ts" --include="*.tsx" packages/ server/ src/ 2>/dev/null | grep -v node_modules | grep -v ".d.ts" || true)

          if [ -n "$LEAKS" ]; then
            echo "::error::Runtime code imports from openclaw/ directory (should use @cdf-know/* packages):"
            echo "$LEAKS"
            exit 1
          fi

          echo "✓ No runtime imports from openclaw/ directory"

      - name: Check 4 upstream fixes status
        run: |
          echo "=== Checking 4 upstream fixes status ==="

          if grep -q "wait_for_dsstore_flush" scripts/create-dmg.sh 2>/dev/null; then
            echo "✓ Fix #4 (DMG wait_for_dsstore_flush): PORTED"
          else
            echo "::warning::Fix #4 (DMG wait_for_dsstore_flush): NOT PORTED"
          fi

          if grep -q "attempt >= 8" scripts/create-dmg.sh 2>/dev/null; then
            echo "✓ Fix #4b (DMG attempt >= 8): PORTED"
          else
            echo "::warning::Fix #4b (DMG attempt >= 8): NOT PORTED"
          fi

          if [ -f "packages/memory-host-sdk/src/runtimeBridge.ts" ] && \
             [ -f "packages/memory-host-sdk/src/stateRegistry.ts" ] && \
             [ -f "packages/memory-host-sdk/src/vectorBackend.ts" ]; then
            echo "✓ Fixes #1-3 (memory-host-sdk): Semantic redo ported"
          else
            echo "::warning::Fixes #1-3 (memory-host-sdk): Semantic redo modules missing"
          fi

      - name: Run sync-openclaw drift detection (if script exists)
        run: |
          if [ -f "scripts/sync-openclaw.sh" ]; then
            chmod +x scripts/sync-openclaw.sh
            bash scripts/sync-openclaw.sh --check-only 2>&1 || true
          else
            echo "::warning::scripts/sync-openclaw.sh not found — drift detection script is missing"
          fi
