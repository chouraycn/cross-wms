name: Automated Release Workflow

# This workflow has been merged into ci.yml.
# ci.yml now handles the full pipeline: quality gate → build DMG → GitHub Release.
# This file is kept for backward compatibility and will be removed in a future cleanup.

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch/minor/major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: automated-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-ci:
    name: Trigger CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "This workflow has been merged into ci.yml."
          echo "To build a DMG, push to main/master or use the CI workflow directly."
          echo "For manual version bump + release, use build-and-release.yml instead."
