name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

permissions:
  contents: read
  packages: write
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/pr-quality-gate.yml

  build-docker:
    name: Build Docker Image
    needs: quality-gate
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ${{ steps.meta.outputs.tags }}
          docker inspect ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'Production' }}
    needs: build-docker
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    if: github.event.inputs.environment || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "Deploying to ${{ github.event.inputs.environment || 'production' }}..."
            
            cd /opt/cross-wms
            
            echo "Pulling latest image..."
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            
            echo "Stopping old container..."
            docker stop cross-wms-server || true
            docker rm cross-wms-server || true
            
            echo "Starting new container..."
            docker run -d \
              --name cross-wms-server \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /opt/cross-wms/data:/app/data \
              -v /opt/cross-wms/logs:/app/logs \
              -e NODE_ENV=${{ github.event.inputs.environment === 'development' && 'development' || 'production' }} \
              -e PORT=3000 \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            
            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 10
          
          for i in {1..10}; do
            if curl -s http://${{ secrets.DEPLOY_HOST }}:3000/health > /dev/null; then
              echo "✅ Service is healthy!"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 5
          done
          
          echo "❌ Service failed to start"
          exit 1

  notify:
    name: Send Deployment Notification
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
