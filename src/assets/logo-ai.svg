<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" fill="none">
  <!-- 外圈圆环 -->
  <circle cx="28" cy="28" r="26" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- 内圈背景 -->
  <circle cx="28" cy="28" r="22" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- 中心六边形 -->
  <path d="M28 10 L42.5 18.5 L42.5 35.5 L28 44 L13.5 35.5 L13.5 18.5 Z" 
        stroke="url(#grad1)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  
  <!-- 内部连接线 -->
  <path d="M28 18 L28 36 M20 24 L36 24 M20 30 L36 30" 
        stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- 中心点 -->
  <circle cx="28" cy="28" r="3" fill="url(#grad1)"/>
  
  <!-- 四个角点 -->
  <circle cx="28" cy="14" r="2" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="28" cy="42" r="2" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="16" cy="21" r="2" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="40" cy="21" r="2" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="16" cy="35" r="2" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="40" cy="35" r="2" fill="url(#grad1)" opacity="0.8"/>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>