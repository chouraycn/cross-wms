version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cross-wms-server
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cross-wms-server-dev
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-3000}
      - LOG_LEVEL=debug
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

networks:
  default:
    name: cross-wms-network
