version: '3.8'

services:
  cross-wms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cross-wms
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - cross-wms-data:/app/data
      - cross-wms-logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000

volumes:
  cross-wms-data:
  cross-wms-logs: