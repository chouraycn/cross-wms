<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDF Know Claw - 启动中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .splash-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: splashFadeOut 0.8s ease-in 5.5s forwards;
        }

        /* SVG 容器 — 缩放弹入 */
        .logo-svg {
            width: 96px;
            height: 96px;
            transform: scale(0);
            animation: logoScaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        }

        /* 主路径描边动画 */
        .logo-svg .path-main {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: drawPath 1.8s cubic-bezier(0.65, 0, 0.35, 1) 0.5s forwards;
        }

        /* 填充渐入 */
        .logo-svg .path-fill {
            fill: #1a1a1a;
            opacity: 0;
            animation: fillIn 0.6s ease-out 2.0s forwards;
        }

        /* 光晕效果 */
        .glow-ring {
            position: absolute;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0);
            animation: glowPulse 2s ease-in-out 2.5s forwards;
        }

        /* 品牌文字 */
        .brand-text {
            position: absolute;
            bottom: -40px;
            font-size: 14px;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: 1.5px;
            white-space: nowrap;
            opacity: 0;
            animation: textFadeIn 1s ease-out 2.8s forwards;
        }

        /* 背景微光 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.03) 0%, transparent 70%);
            opacity: 0;
            animation: bgGlow 3s ease-in-out 1s forwards;
        }

        /* ===== Keyframes ===== */

        @keyframes logoScaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            60% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes drawPath {
            0% {
                stroke-dashoffset: 600;
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        @keyframes fillIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0% {
                transform: scale(0.8);
                border-color: rgba(0, 0, 0, 0);
                opacity: 0;
            }
            50% {
                border-color: rgba(0, 0, 0, 0.15);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                border-color: rgba(0, 0, 0, 0);
                opacity: 0;
            }
        }

        @keyframes textFadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 0.6;
                transform: translateY(0);
            }
        }

        @keyframes splashFadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        @keyframes bgGlow {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="splash-container" id="splashContainer">
        <div class="glow-ring"></div>

        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 主路径 - 描边动画层 -->
            <path class="path-main" d="M93.45,36.53l-11.5,16.57,10.03,14.41c2.25-5.4,3.5-11.32,3.5-17.53,0-4.68-.71-9.2-2.02-13.45Z"/>
            <path class="path-main" d="M57.48,88.15c-2.65.57-5.4.88-8.23.88-6.04,0-11.77-1.37-16.88-3.83V18.56c0-2.38,1.47-4.54,3.71-5.34,4.11-1.47,8.55-2.28,13.17-2.28.91,0,1.81.03,2.71.1v44.36c0,2.49,3.21,3.5,4.64,1.45l26.5-38.08c-7.87-8.37-18.87-13.77-31.13-14.32v.03c-.9-.05-1.8-.08-2.71-.08C24.07,4.39,3.66,24.8,3.66,49.99s20.41,45.59,45.59,45.59c1.04,0,2.07-.04,3.09-.11l-.03.04c10.67-.56,20.36-4.8,27.85-11.46l-6.65-9.55c-1.56-2.25-4.89-2.25-6.46-.01l-9.57,13.65Z"/>

            <!-- 主路径 - 填充层 -->
            <path class="path-fill" d="M93.45,36.53l-11.5,16.57,10.03,14.41c2.25-5.4,3.5-11.32,3.5-17.53,0-4.68-.71-9.2-2.02-13.45Z"/>
            <path class="path-fill" d="M57.48,88.15c-2.65.57-5.4.88-8.23.88-6.04,0-11.77-1.37-16.88-3.83V18.56c0-2.38,1.47-4.54,3.71-5.34,4.11-1.47,8.55-2.28,13.17-2.28.91,0,1.81.03,2.71.1v44.36c0,2.49,3.21,3.5,4.64,1.45l26.5-38.08c-7.87-8.37-18.87-13.77-31.13-14.32v.03c-.9-.05-1.8-.08-2.71-.08C24.07,4.39,3.66,24.8,3.66,49.99s20.41,45.59,45.59,45.59c1.04,0,2.07-.04,3.09-.11l-.03.04c10.67-.56,20.36-4.8,27.85-11.46l-6.65-9.55c-1.56-2.25-4.89-2.25-6.46-.01l-9.57,13.65Z"/>
        </svg>

        <div class="brand-text">CDF Know Claw</div>
    </div>

    <script>
        // ========== 跳转逻辑（最先注册，确保不被其他代码阻塞）==========
        // 动画完成后自动跳转到主页面
        // splashFadeOut 在 5.5s 开始持续 0.8s → 6.3s 后执行跳转
        var SPLASH_DURATION = 6300; // 6.3 秒

        // 使用相对路径，避免 pywebview WKWebView 中绝对路径解析问题
        var MAIN_PAGE = './index.html';

        function navigateToMain() {
            try {
                // 方法 1：replace 避免浏览器历史残留 splash 页
                window.location.replace(MAIN_PAGE);
            } catch(e) {
                // WKWebView 中 replace 可能被限制，fallback 到 href
                try {
                    window.location.href = MAIN_PAGE;
                } catch(e2) {
                    // 最后兜底
                    window.location = MAIN_PAGE;
                }
            }
        }

        setTimeout(navigateToMain, SPLASH_DURATION);

        // ========== 预加载主页面资源 ==========
        // 在 splash 动画进行的同时，后台预加载 index.html 及其依赖
        (function preloadMainApp() {
            var preloadedResources = [];

            function prefetch(url, as) {
                if (preloadedResources.indexOf(url) !== -1) return;
                preloadedResources.push(url);

                var link = document.createElement('link');
                link.rel = 'prefetch';
                link.href = url;
                if (as) link.as = as;
                document.head.appendChild(link);
            }

            // 直接 fetch index.html 解析资源列表（使用相对路径）
            try {
                fetch(MAIN_PAGE)
                    .then(function(resp) { return resp.text(); })
                    .then(function(html) {
                        var parser = new DOMParser();
                        var doc = parser.parseFromString(html, 'text/html');

                        doc.querySelectorAll('script[src]').forEach(function(s) {
                            prefetch(s.getAttribute('src'), 'script');
                        });
                        doc.querySelectorAll('link[rel="stylesheet"]').forEach(function(l) {
                            prefetch(l.getAttribute('href'), 'style');
                        });
                        doc.querySelectorAll('link[rel="modulepreload"]').forEach(function(l) {
                            prefetch(l.getAttribute('href'), 'script');
                        });

                        console.log('[Splash] 预加载了 ' + preloadedResources.length + ' 个主页面资源');
                    })
                    .catch(function(err) {
                        console.warn('[Splash] 预加载失败:', err);
                    });
            } catch(e) {
                // DOMParser 等 API 不可用时的静默降级
                console.warn('[Splash] 预加载不可用，将在动画完成后直接跳转');
            }
        })();
    </script>
</body>
</html>
