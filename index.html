<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDF Know Claw</title>
    <style>
      /* v8.7: 加载占位 + 错误提示（WKWebView 兼容，无 @keyframes） */
      #root-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #888;
        font-size: 15px;
      }
      #root-error {
        display: none;
        padding: 40px 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #c00;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #root-error.show { display: block; }
      #root-loading.hide { display: none; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loading">加载中...</div>
    </div>
    <div id="root-error"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- v8.7: 全局错误捕获（WKWebView 兼容） -->
    <script>
      (function() {
        var MAX_WAIT = 8000;  // 8 秒后 React 还未挂载就认为失败
        var timer = setTimeout(function() {
          var loading = document.getElementById('root-loading');
          var root = document.getElementById('root');
          if (root && root.children.length <= 1) {
            // React 未挂载
            showError('React 挂载超时（8秒）。可能原因：\\n1. JavaScript 执行出错\\n2. WKWebView 不兼容某些语法\\n3. 资源加载失败\\n\\n请打开控制台查看详细错误。');
          }
        }, MAX_WAIT);

        // React 挂载后会替换 #root 内容，隐藏 loading
        var observer = new MutationObserver(function() {
          var loading = document.getElementById('root-loading');
          if (loading) loading.className = 'hide';
          clearTimeout(timer);
        });
        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true, subtree: true });

        // 全局 JS 错误捕获
        window.onerror = function(msg, url, line, col, err) {
          showError('JS 错误: ' + msg + '\\n' + (url || '') + ':' + (line || '') + ':' + (col || ''));
          return false;
        };
        window.addEventListener('error', function(e) {
          if (e.error) showError('Error: ' + (e.error.stack || e.error.message));
        }, true);
        window.addEventListener('unhandledrejection', function(e) {
          showError('Unhandled Rejection: ' + (e.reason?.stack || String(e.reason)));
        });

        function showError(msg) {
          var el = document.getElementById('root-error');
          if (el) { el.textContent = msg; el.className = 'show'; }
          var loading = document.getElementById('root-loading');
          if (loading) loading.className = 'hide';
        }
      })();
    </script>
  </body>
</html>
